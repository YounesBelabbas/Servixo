name: servixo
description: "Servixo - Global Multi-Service Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Backend & Auth
  supabase_flutter: ^2.6.0

  # Routing
  go_router: ^14.0.1

  # Models & Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Networking & Utilities
  dio: ^5.4.3
  intl: ^0.20.2
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  image_picker: ^1.1.0
  permission_handler: ^11.3.1
  shimmer: any
  sentry_flutter: ^8.2.0

  # UI Core (للضرورة والـ Splash)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation Tools
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # تهيئة مجلد الـ Assets للوغو والـ Animations لاحقاً
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/